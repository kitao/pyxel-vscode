name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run package
      - run: >
          gh release create "$GITHUB_REF_NAME" *.vsix
          --title "$GITHUB_REF_NAME"
          --notes "See [CHANGELOG.md](https://github.com/kitao/pyxel-vscode/blob/main/CHANGELOG.md)."
        env:
          GH_TOKEN: ${{ github.token }}
